:root{
  --cream:#FFF8EC;--card:#FFFBF3;--border:#E8D7B8;
  --ink:#2B1810;--ink2:#6B4226;
  --sun:#F4A460;--sun2:#D97634;
  --grass:#7FAD5C;--grass2:#5A7A3E;
  --sky:#5BA3D0;--sky2:#3B7BA8;
  --rose:#E07070;--rose2:#B84040;
  --gold:#FFD700;--purple:#9B59B6;
}
*{-webkit-tap-highlight-color:transparent;box-sizing:border-box;}
body{font-family:'Fredoka',system-ui,sans-serif;background:var(--cream);color:var(--ink);overscroll-behavior:none;min-height:100vh;}
body.rtl{direction:rtl;}
.ar{font-family:'Cairo',sans-serif;}
.card{background:var(--card);border:2px solid var(--border);border-radius:20px;box-shadow:0 4px 14px rgba(43,24,16,.1);}
.btn{border:none;cursor:pointer;font-family:inherit;font-weight:700;box-shadow:0 4px 0 rgba(0,0,0,.18);transition:transform .08s,box-shadow .08s;border-radius:14px;display:inline-flex;align-items:center;justify-content:center;gap:6px;}
.btn:active{transform:translateY(2px);box-shadow:0 2px 0 rgba(0,0,0,.18);}
.btn:disabled{opacity:.45;cursor:not-allowed;}
.btn-sun{background:var(--sun);color:#fff;}
.btn-grass{background:var(--grass);color:#fff;}
.btn-sky{background:var(--sky);color:#fff;}
.btn-rose{background:var(--rose);color:#fff;}
.btn-white{background:#fff;color:var(--ink);}
.btn-gold{background:linear-gradient(135deg,#FFD700,#FFA500);color:#fff;}
.btn-purple{background:var(--purple);color:#fff;}
.btn-nav{background:#fff;color:var(--ink);border:2px solid var(--border);box-shadow:0 3px 0 rgba(0,0,0,.12);padding:14px 24px;font-size:1.2rem;}
.btn-nav:disabled{opacity:.3;}
.pop{animation:pop .28s cubic-bezier(.18,.89,.32,1.28);}
@keyframes pop{0%{transform:scale(.85);opacity:0}100%{transform:scale(1);opacity:1}}
.float{animation:float 4s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.bar-track{background:#E8D7B8;border-radius:99px;overflow:hidden;}
.bar-fill{background:var(--sun);border-radius:99px;transition:width .4s cubic-bezier(.18,.89,.32,1.28);}
.letter-main{font-size:clamp(80px,20vw,120px);font-weight:700;line-height:1;color:var(--sun2);}
.letter-lower{font-size:clamp(40px,10vw,60px);color:#bbb;font-weight:400;}
.cf{position:fixed;pointer-events:none;top:-10px;z-index:9999;animation:fall 2.6s linear forwards;}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:var(--card);border-radius:24px;padding:32px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.3);max-height:90vh;overflow-y:auto;}
.badge-premium{background:linear-gradient(135deg,#FFD700,#FFA500);color:#fff;border-radius:8px;padding:2px 8px;font-size:.75rem;font-weight:700;}
.badge-free{background:#E8F0FE;color:#3B7BA8;border-radius:8px;padding:2px 8px;font-size:.75rem;font-weight:700;}
.lb-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:14px;margin-bottom:8px;}
.star{font-size:1.4rem;cursor:pointer;transition:transform .1s;}
.star:hover{transform:scale(1.2);}
.lang-more{display:none;animation:pop .2s ease;}
.lang-more.open{display:grid;}
</style>
</head>

const _raw=localStorage.getItem('roj4');

function save(){localStorage.setItem('roj4',JSON.stringify(S));}

function $(id){return document.getElementById(id);}
function sh(html){$('app').innerHTML=html;}
function confetti(n=40){
  const r=$('croot');
  ['#F4A460','#D97634','#7FAD5C','#5BA3D0','#FFD700'].forEach((c,ci)=>{
    for(let i=ci;i<n;i+=5){
      const e=document.createElement('div');
      e.className='cf';
      e.style.cssText=`left:${Math.random()*100}vw;background:${c};width:10px;height:10px;border-radius:2px;animation-delay:${Math.random()*.8}s;`;
      r.appendChild(e);setTimeout(()=>e.remove(),3000);
    }
  });
}
function shuffle(a){return [...a].sort(()=>Math.random()-.5);}
function canAccess(type,id=null){
  if(S.isPremium)return true;
  if(type==='abc')return S.abc<FREE_ABC;
  if(type==='num')return S.num<FREE_NUM;
  if(type==='voc')return FREE_UNITS.includes(id);
  return false;
}
function getLangTr(obj){return obj[S.lang]??obj.en??'';}
function closeModal(){$('modal-root').innerHTML='';}
window.closeModal=closeModal;

═══════════════════════════════════════ */
async function initAuth(){
  const{data:{session}}=await sb.auth.getSession();
  if(session?.user){
    S.user=session.user;
    await checkPremium(session.user.id);
    save();
  }
  sb.auth.onAuthStateChange(async(_,sess)=>{
    if(sess?.user){S.user=sess.user;await checkPremium(sess.user.id);}
    else{S.user=null;S.isPremium=false;}
    save();render();
  });
}

async function checkPremium(userId){
  const{data}=await sb.from('subscriptions').select('status,current_period_end').eq('user_id',userId).single();
  if(data&&data.status==='active'){
    S.isPremium=new Date(data.current_period_end)>new Date();
  }else{S.isPremium=false;}
}

function showAuth(mode='login'){
  const ar=isAr();
  $('modal-root').innerHTML=`
    <div class="overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal pop" style="${dir()}">
        <div style="font-size:2rem;text-align:center;margin-bottom:4px;">☀️</div>
        <h2 style="text-align:center;font-size:1.4rem;margin-bottom:20px;">${mode==='login'?T('login'):T('signup')}</h2>
        <div id="auth-err" style="color:var(--rose);font-size:.9rem;margin-bottom:8px;text-align:center;display:none;"></div>
        <label style="font-size:.85rem;font-weight:700;color:var(--ink2);">${T('email')}</label>
        <input id="ae" type="email" style="width:100%;padding:12px;border:2px solid var(--border);border-radius:12px;font-size:1rem;font-family:inherit;background:#FFF6E5;outline:none;margin:6px 0 14px;">
        <label style="font-size:.85rem;font-weight:700;color:var(--ink2);">${T('password')}</label>
        <input id="ap" type="password" style="width:100%;padding:12px;border:2px solid var(--border);border-radius:12px;font-size:1rem;font-family:inherit;background:#FFF6E5;outline:none;margin:6px 0 20px;">
        <button onclick="doAuth('${mode}')" class="btn btn-sun" style="width:100%;padding:14px;font-size:1.05rem;border-radius:14px;margin-bottom:12px;">${mode==='login'?T('login'):T('signup')}</button>
        <p style="text-align:center;font-size:.9rem;color:var(--ink2);">
          ${mode==='login'?T('authSwitch'):T('authSwitch2')}
          <button onclick="showAuth('${mode==='login'?'signup':'login'}')" style="background:none;border:none;color:var(--sky);font-weight:700;cursor:pointer;font-family:inherit;">${mode==='login'?T('signup'):T('login')}</button>
        </p>
      </div>
    </div>`;
}

async function doAuth(mode){
  const email=$('ae').value.trim();
  const pass=$('ap').value;
  const errEl=$('auth-err');
  errEl.style.display='none';
  let res;
  if(mode==='signup'){
    res=await sb.auth.signUp({email,password:pass,options:{data:{name:S.name}}});
    if(!res.error){await sb.from('profiles').upsert({id:res.data.user.id,name:S.name,lang:S.lang},{onConflict:'id'});}
  }else{
    res=await sb.auth.signInWithPassword({email,password:pass});
  }
  if(res.error){errEl.textContent=res.error.message;errEl.style.display='block';return;}
  closeModal();render();
}

async function doLogout(){await sb.auth.signOut();S.user=null;S.isPremium=false;save();render();}
window.showAuth=showAuth;window.doAuth=doAuth;window.doLogout=doLogout;

async function subscribe(priceId){
  if(!S.user){closeModal();showAuth('signup');return;}
  try{
    const res=await fetch('/api/create-checkout',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({priceId,userId:S.user.id,userEmail:S.user.email})});
    const{url}=await res.json();
    window.location.href=url;
  }catch(e){alert('Error: '+e.message);}
}
window.showUpgrade=showUpgrade;window.subscribe=subscribe;

async function updateLeaderboard(score,total){
  if(!S.user||score<total)return;
  const cur=await sb.from('leaderboard').select('perfect_quizzes').eq('user_id',S.user.id).single();

function render(){
  document.body.classList.toggle('rtl',isAr());
  if(!S.name||S.step==='lang'||S.step==='name')return rWelcome();
  const routes={home:rHome,abc:rAbc,num:rNum,vocMenu:rVocMenu,voc:rVoc,quiz:rQuiz,reviewMenu:rReviewMenu,leaderboard:rLeaderboard,settings:rSettings,reviews:rReviews,feedback:rFeedback};
  const fn=routes[S.step];
  if(fn)fn();else rHome();
}

function go(step,params={}){
  S.step=step;Object.assign(S,params);save();render();
}
window.go=go;

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;">
            ${mainLangs.map(k=>`
              <button onclick="window.selLang('${k}')" class="btn" style="padding:12px 8px;font-size:1rem;border-radius:12px;
                background:${cur===k?'var(--sun)':'#fff'};color:${cur===k?'#fff':'var(--ink)'};
                border:2px solid ${cur===k?'var(--sun2)':'var(--border)'};">
                ${L[k].flag} ${cur===k?'✓ ':''}${L[k].n}</button>`).join('')}
          </div>
          <!-- MORE LANGUAGES TOGGLE -->
          <button onclick="window.toggleMore()" style="background:none;border:2px solid var(--border);border-radius:10px;width:100%;padding:8px;font-size:.9rem;color:var(--ink2);cursor:pointer;font-family:inherit;" id="more-btn">
            ＋ More languages
          </button>
          <div id="lang-more" class="lang-more" style="grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;">
            ${otherLangs.map(k=>`
              <button onclick="window.selLang('${k}')" class="btn" style="padding:10px 8px;font-size:.9rem;border-radius:12px;
                background:${cur===k?'var(--sky)':'#fff'};color:${cur===k?'#fff':'var(--ink)'};
                border:2px solid ${cur===k?'var(--sky2)':'var(--border)'};">
                ${L[k].flag} ${L[k].n}</button>`).join('')}
          </div>
        </div>

        <!-- NAME -->
        <div>
          <div style="font-size:.8rem;font-weight:700;color:var(--ink2);margin-bottom:10px;text-transform:uppercase;letter-spacing:.05em;">👤 ${L[cur].whatName}</div>
          <input id="ni" type="text" placeholder="${L[cur].namePlaceholder}" value="${S.name||''}"
            style="width:100%;padding:14px;border:2px solid var(--border);border-radius:12px;font-size:1.1rem;font-family:inherit;background:#FFF6E5;outline:none;">
        </div>

        <button onclick="window.doStart()" class="btn btn-sun" style="padding:16px;font-size:1.1rem;border-radius:14px;width:100%;">
          ${L[cur].letsStart} →</button>
      </div>
    </div>`;

  window.selLang=k=>{S.lang=k;save();rWelcome();};
  window.toggleMore=()=>{
    const el=$('lang-more');
    const btn=$('more-btn');
    if(el.classList.contains('open')){el.classList.remove('open');btn.textContent='＋ More languages';}
    else{el.classList.add('open');btn.textContent='− Less';}
  };
  // auto open if secondary lang selected
  if(!L[cur].main){
    setTimeout(()=>{
      const el=$('lang-more');
      if(el)el.classList.add('open');
    },50);
  }
  window.doStart=()=>{
    const n=$('ni').value.trim();
    if(!n){$('ni').style.borderColor='var(--rose)';$('ni').focus();return;}
    S.name=n;S.step='home';save();render();
  };
  setTimeout(()=>$('ni')?.addEventListener('keypress',e=>{if(e.key==='Enter')window.doStart();}),100);
}

function buildQuiz(type,unitId){
  if(type==='abc'){
    return shuffle(ABC).slice(0,10).map(item=>({
      q:item.ph[S.lang]||item.ph.en,correct:item.l,
      opts:shuffle([item.l,...shuffle(ABC.filter(x=>x.l!==item.l)).slice(0,3).map(x=>x.l)])
    }));
  }
  if(type==='num'){
    return shuffle(NUMS).slice(0,10).map(item=>({
      q:String(item.n),correct:item.ku,
      opts:shuffle([item.ku,...shuffle(NUMS.filter(x=>x.n!==item.n)).slice(0,3).map(x=>x.ku)])
    }));
  }
  const unit=UNITS.find(u=>u.id===unitId);
  return shuffle(unit.words).map(item=>({
    q:getLangTr(item.tr),qEm:item.em,correct:item.ku,
    opts:shuffle([item.ku,...shuffle(unit.words.filter(x=>x.ku!==item.ku)).slice(0,3).map(x=>x.ku)])
  }));
}

window.startQuiz=(type,unitId)=>{
  S.quiz={type,unitId,qs:buildQuiz(type,unitId),cur:0,score:0};
  S.step='quiz';save();render();
};

function rQuiz(){
  const{type,unitId,qs,cur,score}=S.quiz;
  if(cur>=qs.length)return rQuizResult();
  const q=qs[cur];
  const questionLabel=type==='abc'?T('qAbc'):type==='num'?T('qNum'):T('qVoc');
  sh(`
    <div style="min-height:100vh;${dir()}">
      <div style="background:linear-gradient(135deg,#E8F4FF,#D0EEFF);padding:16px 20px;display:flex;align-items:center;gap:12px;">

        <div style="background:#E8F4FF;border:2px solid #9ACAED;border-radius:10px;padding:6px 14px;font-weight:700;color:var(--sky2);">${score}✓</div>
      </div>
      <div style="padding:0 20px;background:linear-gradient(135deg,#E8F4FF,#D0EEFF);">
        <div style="background:#B8D8EE;border-radius:99px;height:8px;margin-bottom:16px;overflow:hidden;">
          <div style="background:var(--sky);height:100%;width:${(cur/qs.length*100).toFixed(0)}%;transition:width .4s;border-radius:99px;"></div>
        </div>
      </div>
      <div style="max-width:480px;margin:0 auto;padding:20px;">
        <div class="card pop" style="padding:28px 24px;text-align:center;margin-bottom:20px;">
          <div style="font-size:.9rem;color:var(--ink2);margin-bottom:10px;">${questionLabel}</div>
          ${q.qEm?`<div style="font-size:52px;margin-bottom:8px;">${q.qEm}</div>`:''}
          <div style="font-size:${type==='num'?'3.5rem':'1.8rem'};font-weight:700;${isAr()?'font-family:Cairo,sans-serif;':''}">${q.q}</div>
          <div style="font-size:.85rem;color:#9ACAED;margin-top:10px;">${T('answer')}</div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;" id="opts">
          ${q.opts.map((opt,i)=>`
            <button id="opt-${i}" onclick="pickOpt(${i},'${opt.replace(/'/g,"\\'")}')"
              class="btn btn-white" style="padding:20px 12px;font-size:1.4rem;border:2px solid var(--border);border-radius:16px;">
              ${opt}</button>`).join('')}
        </div>
      </div>
    </div>`);
  window.pickOpt=(i,chosen)=>{
    const correct=S.quiz.qs[S.quiz.cur].correct;
    const isRight=chosen===correct;
    S.quiz.qs[S.quiz.cur].opts.forEach((_,j)=>{const b=document.getElementById(`opt-${j}`);if(b)b.disabled=true;});
    const cb=document.getElementById(`opt-${i}`);
    if(isRight){cb.style.background='var(--grass)';cb.style.color='#fff';cb.style.borderColor='var(--grass2)';S.quiz.score++;}
    else{
      cb.style.background='var(--rose)';cb.style.color='#fff';cb.style.borderColor='var(--rose2)';
      S.quiz.qs[S.quiz.cur].opts.forEach((opt,j)=>{if(opt===correct){const b=document.getElementById(`opt-${j}`);if(b){b.style.background='var(--grass)';b.style.color='#fff';b.style.borderColor='var(--grass2)';}}});
    }
    save();setTimeout(()=>{S.quiz.cur++;save();render();},900);
  };
}

function rQuizResult(){
  const{qs,score,type,unitId}=S.quiz;
  const pct=Math.round(score/qs.length*100);
  const emoji=pct===100?'🏆':pct>=70?'⭐':pct>=40?'👍':'💪';
  const isPerfect=score===qs.length;
  if(isPerfect&&S.user)updateLeaderboard(score,qs.length);
  confetti(isPerfect?80:20);
  sh(`

          <div style="display:flex;gap:10px;">
            <input id="sni" type="text" value="${S.name}" style="flex:1;padding:12px;border:2px solid var(--border);border-radius:12px;font-size:1rem;font-family:inherit;background:#FFF6E5;outline:none;">
            <button onclick="saveName()" class="btn btn-grass" style="padding:12px 16px;border-radius:12px;">✓</button>
          </div>
          <div id="name-ok" style="color:var(--grass);font-size:.85rem;margin-top:6px;display:none;">✓ ${T('done')}</div>
        </div>

        <div class="card" style="padding:20px;">
          <div style="font-size:.8rem;font-weight:700;color:var(--ink2);margin-bottom:10px;text-transform:uppercase;">🌐 ${T('chooseLanguage')}</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;">
            ${Object.keys(L).filter(k=>L[k].main).map(k=>`
              <button onclick="changeLang('${k}')" class="btn" style="padding:10px 8px;font-size:.95rem;border-radius:12px;
                background:${S.lang===k?'var(--sun)':'#fff'};color:${S.lang===k?'#fff':'var(--ink)'};
                border:2px solid ${S.lang===k?'var(--sun2)':'var(--border)'};">
                ${L[k].flag} ${L[k].n}</button>`).join('')}
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
            ${Object.keys(L).filter(k=>!L[k].main).map(k=>`
              <button onclick="changeLang('${k}')" class="btn" style="padding:10px 8px;font-size:.9rem;border-radius:12px;
                background:${S.lang===k?'var(--sky)':'#fff'};color:${S.lang===k?'#fff':'var(--ink)'};
                border:2px solid ${S.lang===k?'var(--sky2)':'var(--border)'};">
                ${L[k].flag} ${L[k].n}</button>`).join('')}
          </div>
        </div>

        <div class="card" style="padding:20px;">
          <div style="font-size:.8rem;font-weight:700;color:var(--ink2);margin-bottom:10px;text-transform:uppercase;">👤 Account</div>
          ${S.user?`
            <p style="margin-bottom:10px;color:var(--ink2);">📧 ${S.user.email}</p>
            <p style="margin-bottom:12px;">${S.isPremium?`<span class="badge-premium">⭐ Premium</span>`:`<span class="badge-free">Free</span>`}</p>
            ${!S.isPremium?`<button onclick="showUpgrade()" class="btn btn-gold" style="width:100%;padding:12px;border-radius:12px;margin-bottom:8px;">${T('upgrade')}</button>`:''}
            ${isAdmin()?`<button onclick="go('feedback')" class="btn btn-purple" style="width:100%;padding:12px;border-radius:12px;margin-bottom:8px;">📥 ${T('feedbackInbox')}</button>`:''}
            <button onclick="doLogout()" class="btn btn-white" style="width:100%;padding:12px;border-radius:12px;border:2px solid var(--border);">${T('logout')}</button>
          `:`
            <button onclick="showAuth('login')" class="btn btn-sky" style="width:100%;padding:12px;border-radius:12px;margin-bottom:8px;">${T('login')}</button>
            <button onclick="showAuth('signup')" class="btn btn-sun" style="width:100%;padding:12px;border-radius:12px;">${T('signup')}</button>
          `}
        </div>

        ${S.user?`
          <div class="card" style="padding:20px;">
            <div style="display:flex;gap:10px;">
              <button onclick="go('feedback')" class="btn btn-grass" style="flex:1;padding:12px;border-radius:12px;">📝 ${T('feedback')}</button>
              <button onclick="go('reviews')" class="btn btn-sky" style="flex:1;padding:12px;border-radius:12px;">⭐ ${T('reviews')}</button>
            </div>
          </div>`:''}

        <div class="card" style="padding:20px;">
          <div style="font-size:.8rem;font-weight:700;color:var(--ink2);margin-bottom:6px;text-transform:uppercase;">${T('about')}</div>
          <p style="color:var(--ink2);line-height:1.5;font-size:.95rem;">${T('aboutTxt')}</p>
        </div>

        <button onclick="doReset()" class="btn btn-rose" style="padding:16px;font-size:1rem;border-radius:14px;">🗑️ ${T('reset')}</button>
      </div>
    </div>`);

  window.saveName=()=>{
    const v=$('sni').value.trim();if(!v)return;
    S.name=v;save();
    $('name-ok').style.display='block';
    setTimeout(()=>{const el=$('name-ok');if(el)el.style.display='none';},1500);
  };
  window.changeLang=k=>{S.lang=k;save();rSettings();};
  window.doReset=()=>{
    if(confirm(T('resetQ'))){localStorage.removeItem('roj4');S={...defState};save();render();}
  };
}

/* ═══════════════════════════════════════
   STRIPE RETURN
═══════════════════════════════════════ */
function handleStripeReturn(){
  const params=new URLSearchParams(window.location.search);
  if(params.get('success')==='true'){
    window.history.replaceState({},'','/');
    if(S.user)setTimeout(async()=>{await checkPremium(S.user.id);save();render();},2000);
    $('modal-root').innerHTML=`
      <div class="overlay"><div class="modal pop" style="text-align:center;">
        <div style="font-size:60px;margin-bottom:16px;">🎉</div>
        <h2 style="font-size:1.4rem;margin-bottom:8px;">Welcome to Premium!</h2>
        <p style="color:var(--ink2);margin-bottom:20px;">All content is now unlocked.</p>
        <button onclick="closeModal();render();" class="btn btn-grass" style="padding:14px 28px;font-size:1rem;border-radius:14px;">Start learning →</button>
      </div></div>`;
  }
  if(params.get('canceled')==='true')window.history.replaceState({},'','/');
}

/* ═══════════════════════════════════════
   INIT
═══════════════════════════════════════ */
handleStripeReturn();
initAuth().then(()=>render());
</script>
</body>
</html>
